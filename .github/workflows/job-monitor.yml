name: job-monitor

on:
  schedule:
    - cron: '0 22 * * *'
  workflow_dispatch:
    inputs:
      include_existing:
        description: '상태 파일이 비어 있을 때 현재 공고도 신규로 알림'
        required: false
        type: boolean
        default: false

jobs:
  run-monitor:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          python -m playwright install --with-deps chromium

      - name: Run monitor
        shell: bash
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          INPUT_INCLUDE_EXISTING: ${{ github.event.inputs.include_existing || 'false' }}
        run: |
          args=()
          if [[ "$INPUT_INCLUDE_EXISTING" == "true" ]]; then
            args+=(--include-existing)
          fi
          python -m job_monitor "${args[@]}"

      - name: Commit updated state
        shell: bash
        run: |
          if git diff --quiet -- data/seen_jobs.json; then
            echo "No state changes"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/seen_jobs.json
          git commit -m "Update job monitor state [skip ci]"
          git push